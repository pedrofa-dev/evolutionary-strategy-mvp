# Curated dataset catalog for layered validation experiments.
# This catalog makes dataset intent explicit across train, validation,
# external, and audit layers without changing the current runtime yet.
# The current folder-based pipeline remains temporarily supported while
# the repository migrates toward catalog-driven dataset selection.

catalog_id: bnb_1h_spot
description: Curated 1h spot dataset windows for BNBUSDT only.
market_type: spot
timeframe: 1h

datasets:
